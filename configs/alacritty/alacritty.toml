# Alacritty base config.
#
# Colours are generated by matugen/DMS into the imported file below. Keep this
# file for stable behaviour/style settings, and edit the matugen template for
# palette changes.

[general]
live_config_reload = true
import = ["~/.cache/matugen/alacritty/colors.toml"]

[env]
TERM = "xterm-256color"

[window]
decorations = "None"
dynamic_padding = true
opacity = 0.92
startup_mode = "Windowed"

[window.padding]
x = 10
y = 10

[scrolling]
history = 10000
multiplier = 3

[font]
size = 11.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[cursor]
style = { shape = "Block", blinking = "Off" }
unfocused_hollow = true
thickness = 0.15
