# Alacritty colours generated by matugen.
# Do not edit the generated copy directly; edit this template instead.

[colors]
draw_bold_text_with_bright_colors = true
transparent_background_colors = false

[colors.primary]
background = "{{colors.background.default.hex}}"
foreground = "{{colors.on_background.default.hex}}"
dim_foreground = "{{colors.outline.default.hex}}"
bright_foreground = "{{colors.on_surface.default.hex}}"

[colors.cursor]
text = "{{colors.background.default.hex}}"
cursor = "{{colors.primary.default.hex}}"

[colors.vi_mode_cursor]
text = "{{colors.background.default.hex}}"
cursor = "{{colors.tertiary.default.hex}}"

[colors.selection]
text = "{{colors.on_primary_container.default.hex}}"
background = "{{colors.primary_container.default.hex}}"

[colors.search.matches]
foreground = "{{colors.on_secondary_container.default.hex}}"
background = "{{colors.secondary_container.default.hex}}"

[colors.search.focused_match]
foreground = "{{colors.on_primary.default.hex}}"
background = "{{colors.primary.default.hex}}"

[colors.hints.start]
foreground = "{{colors.on_tertiary.default.hex}}"
background = "{{colors.tertiary.default.hex}}"

[colors.hints.end]
foreground = "{{colors.on_tertiary_container.default.hex}}"
background = "{{colors.tertiary_container.default.hex}}"

[colors.footer_bar]
foreground = "{{colors.on_surface.default.hex}}"
background = "{{colors.surface_container_high.default.hex}}"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.normal]
black = "{{colors.surface_container_highest.default.hex}}"
red = "{{colors.error.default.hex}}"
green = "{{colors.secondary.default.hex}}"
yellow = "{{colors.tertiary.default.hex}}"
blue = "{{colors.primary.default.hex}}"
magenta = "{{colors.tertiary.default.hex}}"
cyan = "{{colors.secondary.default.hex}}"
white = "{{colors.on_surface.default.hex}}"

[colors.bright]
black = "{{colors.outline.default.hex}}"
red = "{{colors.error.default.hex}}"
green = "{{colors.secondary.default.hex}}"
yellow = "{{colors.tertiary.default.hex}}"
blue = "{{colors.primary.default.hex}}"
magenta = "{{colors.tertiary.default.hex}}"
cyan = "{{colors.secondary.default.hex}}"
white = "{{colors.on_background.default.hex}}"

[colors.dim]
black = "{{colors.surface_container.default.hex}}"
red = "{{colors.error_container.default.hex}}"
green = "{{colors.secondary_container.default.hex}}"
yellow = "{{colors.tertiary_container.default.hex}}"
blue = "{{colors.primary_container.default.hex}}"
magenta = "{{colors.tertiary_container.default.hex}}"
cyan = "{{colors.secondary_container.default.hex}}"
white = "{{colors.outline_variant.default.hex}}"
