platform: linux

image_resource:
  type: registry-image
  source:
    repository: hashicorp/terraform
    tag: "1.10"

inputs:
- name: repo-main
  path: repo

params:
  # Supplied by each provision job's `params`; NOT a ((var)), or Concourse
  # interpolates it against the `concourse` credential manager and fails with
  # "undefined var: VM_NAME".
  VM_NAME:
  MINIO_ENDPOINT: https://minio.ts.peteches.co.uk
  MINIO_BUCKET:   vm-images
  # AWS creds serve both the image pull below and the Terraform S3 state backend.
  AWS_ACCESS_KEY_ID: ((terraform.minio_access_key))
  AWS_SECRET_ACCESS_KEY: ((terraform.minio_secret_key))
  TF_VAR_proxmox_api_token: ((terraform.proxmox_api_token))

run:
  path: sh
  args:
  - -ec
  - |
    # Pull the built image from MinIO (authenticated GET) to a local file, then
    # let Terraform upload it to the node's local:import datastore over the
    # Proxmox HTTP API (proxmox_virtual_environment_file, content_type=import —
    # the API token is sufficient, no SSH/root on the node). Proxmox never
    # fetches from MinIO itself: its download-url HEAD metadata probe is rejected
    # by MinIO on presigned GET URLs (minio/minio#6146).
    apk add --no-cache aws-cli >/dev/null
    aws --endpoint-url "$MINIO_ENDPOINT" \
      s3 cp "s3://${MINIO_BUCKET}/${VM_NAME}.qcow2" "/tmp/${VM_NAME}.qcow2"
    export TF_VAR_vm_image_files="{\"${VM_NAME}\":\"/tmp/${VM_NAME}.qcow2\"}"
    cd repo/infra/terraform
    terraform init
    terraform apply -auto-approve -target="module.${VM_NAME}"
