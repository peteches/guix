## Image build pipeline
##
## Builds a per-VM QCOW2 image using guix system image, injects the VM's age
## private key (retrieved from Vault), and uploads the result to MinIO.
##
## Two job types per VM:
##   generate-<name>-age-key  — run once to create the keypair in Vault.
##                              Re-run only to rotate keys.
##   build-<name>-image       — triggered automatically on system config changes.
##                              Reads the age private key at runtime with the
##                              vault CLI (vault kv get infra/vms/<name>/age).
##                              NOT a ((var)) credential: Concourse's cred
##                              manager only reads the `concourse` engine, so
##                              VAULT_TOKEN just needs a policy granting read
##                              on infra/data/vms/*.
##
## After a build completes:
##   1. Retrieve the age public key:
##        vault kv get -field=public_key infra/vms/<name>/age > age-keys/<name>.pub
##   2. Commit it to age-keys/<name>.pub, update .sops.yaml, create secrets.
##   3. Add image_url to the VM's module block in infra/terraform and push.

resource_types: []

resources:

- name: repo
  type: git
  source:
    uri: https://github.com/peteches/guix
    branch: main

# Per-VM path-filtered resources — only trigger when the system config changes.

- name: repo-plane
  type: git
  source:
    uri: https://github.com/peteches/guix
    branch: main
    paths:
    - peteches/systems/plane.scm
    - peteches/channels/channels-nug.scm
    - ci/tasks/build-vm-image.yml
    - ci/tasks/generate-age-key.yml

- name: repo-prometheus
  type: git
  source:
    uri: https://github.com/peteches/guix
    branch: main
    paths:
    - peteches/systems/prometheus.scm
    - peteches/channels/channels-nug.scm
    - ci/tasks/build-vm-image.yml
    - ci/tasks/generate-age-key.yml

- name: repo-claude-workstation
  type: git
  source:
    uri: https://github.com/peteches/guix
    branch: main
    paths:
    - peteches/systems/claude-workstation.scm
    - peteches/channels/channels-nug.scm
    - ci/tasks/build-vm-image.yml
    - ci/tasks/generate-age-key.yml

# Per-VM S3 resources — written after a successful image build to trigger the
# terraform pipeline's provision job. MinIO bucket versioning must be enabled
# on vm-images so each put creates a new version:
#   mc version enable nas/vm-images

- name: plane-image-url
  type: s3
  source:
    endpoint: https://minio.ts.peteches.co.uk
    bucket: vm-images
    versioned_file: triggers/plane/url
    access_key_id: ((image-build.minio_access_key))
    secret_access_key: ((image-build.minio_secret_key))

- name: prometheus-image-url
  type: s3
  source:
    endpoint: https://minio.ts.peteches.co.uk
    bucket: vm-images
    versioned_file: triggers/prometheus/url
    access_key_id: ((image-build.minio_access_key))
    secret_access_key: ((image-build.minio_secret_key))

- name: claude-workstation-image-url
  type: s3
  source:
    endpoint: https://minio.ts.peteches.co.uk
    bucket: vm-images
    versioned_file: triggers/claude-workstation/url
    access_key_id: ((image-build.minio_access_key))
    secret_access_key: ((image-build.minio_secret_key))

# Add one S3 resource block per additional VM following the pattern above.

jobs:

- name: generate-plane-age-key
  plan:
  - get: repo
  - task: generate-key
    file: repo/ci/tasks/generate-age-key.yml
    params:
      VM_NAME: plane
      VAULT_ADDR: https://vault.ts.peteches.co.uk

- name: build-plane-image
  plan:
  - get: repo
    resource: repo-plane
    trigger: true
  - task: build-image
    privileged: true
    file: repo/ci/tasks/build-vm-image.yml
    input_mapping:
      repo: repo
    params:
      VM_NAME: plane
      SYSTEM_FILE: peteches/systems/plane.scm
      IMAGE_SIZE: 50G
      MINIO_ENDPOINT: https://minio.ts.peteches.co.uk
      VAULT_ADDR: https://vault.ts.peteches.co.uk
  - put: plane-image-url
    params:
      file: presigned-url/url

- name: generate-prometheus-age-key
  plan:
  - get: repo
  - task: generate-key
    file: repo/ci/tasks/generate-age-key.yml
    params:
      VM_NAME: prometheus
      VAULT_ADDR: https://vault.ts.peteches.co.uk

- name: build-prometheus-image
  plan:
  - get: repo
    resource: repo-prometheus
    trigger: true
  - task: build-image
    privileged: true
    file: repo/ci/tasks/build-vm-image.yml
    input_mapping:
      repo: repo
    params:
      VM_NAME: prometheus
      SYSTEM_FILE: peteches/systems/prometheus.scm
      IMAGE_SIZE: 25G
      MINIO_ENDPOINT: https://minio.ts.peteches.co.uk
      VAULT_ADDR: https://vault.ts.peteches.co.uk
  - put: prometheus-image-url
    params:
      file: presigned-url/url

- name: generate-claude-workstation-age-key
  plan:
  - get: repo
  - task: generate-key
    file: repo/ci/tasks/generate-age-key.yml
    params:
      VM_NAME: claude-workstation
      VAULT_ADDR: https://vault.ts.peteches.co.uk

- name: build-claude-workstation-image
  plan:
  - get: repo
    resource: repo-claude-workstation
    trigger: true
  - task: build-image
    privileged: true
    file: repo/ci/tasks/build-vm-image.yml
    input_mapping:
      repo: repo
    params:
      VM_NAME: claude-workstation
      SYSTEM_FILE: peteches/systems/claude-workstation.scm
      IMAGE_SIZE: 50G
      MINIO_ENDPOINT: https://minio.ts.peteches.co.uk
      VAULT_ADDR: https://vault.ts.peteches.co.uk
  - put: claude-workstation-image-url
    params:
      file: presigned-url/url

# Add one generate + build job pair per additional VM following the pattern above.
