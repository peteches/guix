jobs:
- name: plan-branches
  plan:
  - get: non-main-branches
    trigger: true
  - get: repo-main
    trigger: false
  - load_var: branches
    file: non-main-branches/branches.json
  - across:
    - var: branch
      values: ((.:branches))
      max_in_flight: 3
    task: plan-branch
    file: repo-main/ci/tasks/terraform-plan-branch.yml
    params:
      BRANCH_NAME: ((.:branch.name))
      AWS_ACCESS_KEY_ID: ((terraform.minio_access_key))
      AWS_SECRET_ACCESS_KEY: ((terraform.minio_secret_key))
      TF_VAR_proxmox_api_token: ((terraform.proxmox_api_token))

- name: plan-main
  plan:
  - get: repo-main
    trigger: true
  - task: plan
    file: repo-main/ci/tasks/terraform-plan.yml
    params:
      AWS_ACCESS_KEY_ID: ((terraform.minio_access_key))
      AWS_SECRET_ACCESS_KEY: ((terraform.minio_secret_key))
      TF_VAR_proxmox_api_token: ((terraform.proxmox_api_token))

- name: apply-main
  plan:
  - get: repo-main
    passed:
    - plan-main
    trigger: true
  - task: apply
    file: repo-main/ci/tasks/terraform-apply.yml
    params:
      AWS_ACCESS_KEY_ID: ((terraform.minio_access_key))
      AWS_SECRET_ACCESS_KEY: ((terraform.minio_secret_key))
      TF_VAR_proxmox_api_token: ((terraform.proxmox_api_token))
      PETECHES_SSH_PRIVATE_KEY: ((terraform.peteches_ssh_private_key))

# Per-VM provision jobs — triggered by new image builds via the S3 trigger.
# Each runs a targeted apply for one VM: the terraform-apply task pulls the qcow2
# from MinIO and Terraform uploads it to the node's local:import store over the
# Proxmox API, then imports the boot disk from it. import_from is create-only, so
# once the VM exists a rebuilt image does not re-provision it — recreate the VM
# (state rm + apply) to roll a new image.

- name: provision-plane
  plan:
  - get: repo-main
  - get: plane-image-url
    trigger: true
  - task: terraform-apply
    file: repo-main/ci/tasks/terraform-apply-vm.yml
    params:
      VM_NAME: plane

- name: provision-prometheus
  plan:
  - get: repo-main
  - get: prometheus-image-url
    trigger: true
  - task: terraform-apply
    file: repo-main/ci/tasks/terraform-apply-vm.yml
    params:
      VM_NAME: prometheus

- name: provision-claude-workstation
  plan:
  - get: repo-main
  - get: claude-workstation-image-url
    trigger: true
  - task: terraform-apply
    file: repo-main/ci/tasks/terraform-apply-vm.yml
    params:
      VM_NAME: claude-workstation

# Add one provision job per additional VM following the pattern above.

resource_types:
- name: git-branches
  source:
    repository: aoldershaw/git-branches-resource
  type: registry-image
# Pin the s3 resource type to a version supporting the `use_path_style'
# source option; the resources set use_path_style: true so MinIO buckets go
# in the path, not as a subdomain.  Keep the tag in sync with
# ci/image-build-pipeline.yml.
- name: s3
  type: registry-image
  source:
    repository: concourse/s3-resource
    tag: "2.5.4"

resources:
- name: non-main-branches
  source:
    branch_regexp: ^(?!main$).*
    uri: https://github.com/peteches/guix
  type: git-branches

- name: repo-main
  source:
    branch: main
    paths:
    - infra/terraform/*
    - ci/tasks/*
    uri: https://github.com/peteches/guix
  type: git

# Per-VM presigned URL trigger files — written by the image build pipeline after
# a successful build. When a new version appears, the provision job triggers.
# MinIO bucket versioning must be enabled on vm-images:
#   mc version enable nas/vm-images

- name: plane-image-url
  type: s3
  source:
    endpoint: https://minio.ts.peteches.co.uk
    use_path_style: true
    bucket: vm-images
    versioned_file: triggers/plane/image-url
    access_key_id: ((image-build.minio_access_key))
    secret_access_key: ((image-build.minio_secret_key))

- name: prometheus-image-url
  type: s3
  source:
    endpoint: https://minio.ts.peteches.co.uk
    use_path_style: true
    bucket: vm-images
    versioned_file: triggers/prometheus/image-url
    access_key_id: ((image-build.minio_access_key))
    secret_access_key: ((image-build.minio_secret_key))

- name: claude-workstation-image-url
  type: s3
  source:
    endpoint: https://minio.ts.peteches.co.uk
    use_path_style: true
    bucket: vm-images
    versioned_file: triggers/claude-workstation/image-url
    access_key_id: ((image-build.minio_access_key))
    secret_access_key: ((image-build.minio_secret_key))

# Add one S3 resource per additional VM following the pattern above.
